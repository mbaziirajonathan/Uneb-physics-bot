<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <style>.axis{stroke:black;stroke-width:1}.label{font-size:10px;fill:black;font-family:Arial}.ray{stroke:red;stroke-width:1.5}</style>
    <symbol id="forces" viewBox="0 0 200 120"><rect x="80" y="60" width="40" height="30" fill="gray" stroke="black"/><text x="88" y="80" class="label">Block</text><line x1="100" y1="60" x2="100" y2="30" class="axis"/><text x="105" y="35" class="label">N</text><line x1="100" y1="90" x2="100" y2="110" class="axis"/><text x="105" y="115" class="label">W</text><line x1="120" y1="75" x2="150" y2="75" class="axis"/><text x="152" y="80" class="label">F</text></symbol>
    <symbol id="gas_law" viewBox="0 0 200 120"><rect x="50" y="30" width="60" height="60" fill="lightblue" stroke="black"/><text x="65" y="65" class="label">Gas</text><line x1="30" y1="100" x2="170" y2="100" class="axis"/><line x1="30" y1="100" x2="30" y2="20" class="axis"/><text x="170" y="110" class="label">T</text><text x="15" y="25" class="label">P</text><path d="M40,90 Q100,50 160,30" fill="none" stroke="red" stroke-width="2"/></symbol>
    <symbol id="convex_lens" viewBox="0 0 200 100"><line x1="0" y1="50" x2="200" y2="50" class="axis"/><path d="M100,15 Q115,50 100,85 Q85,50 100,15" fill="lightblue" stroke="blue" stroke-width="2"/><line x1="60" y1="70" x2="100" y2="50" class="ray"/><line x1="60" y1="30" x2="100" y2="50" class="ray"/><line x1="100" y1="50" x2="140" y2="50" class="ray"/><text x="55" y="25" class="label">O</text><text x="135" y="25" class="label">I</text></symbol>
    <symbol id="transverse_wave" viewBox="0 0 200 100"><line x1="10" y1="50" x2="190" y2="50" class="axis"/><path d="M10,50 Q30,20 50,50 T90,50 T130,50 T170,50" fill="none" stroke="blue" stroke-width="2"/><text x="45" y="15" class="label">Crest</text><text x="85" y="95" class="label">Trough</text><text x="80" y="65" class="label">λ</text></symbol>
    <symbol id="series_circuit" viewBox="0 0 200 100"><rect x="10" y="40" width="30" height="20" fill="yellow" stroke="black"/><text x="15" y="54" class="label">V</text><rect x="70" y="40" width="30" height="20" fill="gray" stroke="black"/><text x="75" y="54" class="label">R1</text><rect x="130" y="40" width="30" height="20" fill="gray" stroke="black"/><text x="135" y="54" class="label">R2</text><path d="M40,50 H70 M100,50 H130 M160,50 H180 V70 H10 V50" fill="none" stroke="black" stroke-width="2"/></symbol>
  </defs>
</svg>
