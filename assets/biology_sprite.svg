<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <style>.label{font-size:10px;fill:black;font-family:Arial}</style>
    <!-- 1. CELL: Animal Cell S1 -->
    <symbol id="animal_cell" viewBox="0 0 120 120"><ellipse cx="60" cy="60" rx="50" ry="40" fill="lightyellow" stroke="black"/><circle cx="60" cy="60" r="15" fill="lightblue" stroke="black"/><text x="55" y="65" class="label">N</text><circle cx="35" cy="40" r="5" fill="orange"/><text x="25" y="110" class="label">Animal Cell</text></symbol>
    <!-- 2. CIRCULATION: Heart S2 -->
    <symbol id="heart" viewBox="0 0 120 100"><path d="M60,80 Q20,60 20,35 Q20,15 40,15 Q50,15 60,25 Q70,15 80,15 Q100,15 100,35 Q100,60 60,80" fill="red" stroke="black"/><text x="45" y="50" class="label" fill="white">Heart</text></symbol>
    <!-- 3. PROCESS: Photosynthesis S1 -->
    <symbol id="photosynthesis" viewBox="0 0 150 100"><rect x="10" y="40" width="40" height="40" fill="green"/><text x="15" y="65" class="label" fill="white">Leaf</text><path d="M60,60 L90,30" stroke="yellow" stroke-width="3"/><path d="M60,60 L90,90" stroke="blue" stroke-width="3"/><text x="95" y="35" class="label">O2</text><text x="95" y="95" class="label">Glucose</text><text x="65" y="20" class="label">CO2 + H2O + Light</text></symbol>
    <!-- 4. GENETICS: DNA Double Helix S3 -->
    <symbol id="dna" viewBox="0 0 100 120"><path d="M30,10 Q70,30 30,50 Q70,70 30,90 Q70,110 30,110" fill="none" stroke="blue" stroke-width="2"/><path d="M70,10 Q30,30 70,50 Q30,70 70,90 Q30,110 70,110" fill="none" stroke="red" stroke-width="2"/><text x="30" y="120" class="label">DNA</text></symbol>
    <!-- 5. NERVOUS: Neuron S3 -->
    <symbol id="neuron" viewBox="0 0 150 80"><circle cx="30" cy="40" r="15" fill="yellow" stroke="black"/><text x="25" y="45" class="label">N</text><path d="M45,40 Q80,20 120,40" stroke="black" stroke-width="3" fill="none"/><path d="M30,55 Q30,70 50,70" stroke="black" stroke-width="2" fill="none"/><text x="50" y="75" class="label">Dendrites</text></symbol>
  </defs>
</svg>
